name: CorePlusv2
version: '${project.version}'
main: me.HaoMC7978.coreplus.Main
api-version: '1.20'
prefix: CorePlus
author: HaoMC7978
description: Advanced Core system with Async API, Adventure and PAPI support.

# Các plugin bắt buộc phải có
depend:
  - PlaceholderAPI

# Các plugin hỗ trợ thêm
softdepend:
  - Vault
  - LuckPerms

# Đăng ký các lệnh dựa trên code Java đã viết
commands:
  core:
    description: Lệnh chính quản trị plugin (reload cấu hình).
    aliases: [coreplus, cp2]
    permission: coreplus.admin
    usage: /core reload
  system:
    description: Lệnh quản lý các module hệ thống (enable/disable/reload).
    permission: coreplus.admin
    usage: /system <action> <id>
  combat:
    description: Lệnh dành cho hệ thống chiến đấu.
    permission: coreplus.user

# Đăng ký quyền hạn
permissions:
  coreplus.admin:
    description: Quyền hạn cao nhất để quản lý CorePlusv2.
    default: op
  coreplus.user:
    description: Quyền cơ bản cho người chơi.
    default: true