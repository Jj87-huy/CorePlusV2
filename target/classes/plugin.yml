name: CorePlusv2
version: '1.0.0'
main: me.haomc7978.coreplus.Main
api-version: '1.20'
prefix: CorePlus
author: HaoMC7978
description: Advanced Core system with Async API, Adventure and PAPI support.

# Các plugin bắt buộc phải có để CorePlusv2 chạy được
depend:
  - PlaceholderAPI

# Các plugin có thể có hoặc không (nếu có thì CorePlusv2 sẽ load sau chúng)
softdepend:
  - Vault
  - LuckPerms

# Đăng ký các lệnh gốc (Lệnh chính của các module sẽ được đăng ký tại đây)
commands:
  coreplus:
    description: Main command for CorePlusv2
    aliases: [cp2, core]
  combat:
    description: System Combat command
  system:
    description: System management command
    permission: coreplus.admin

# Đăng ký các quyền hạn (Permissions)
permissions:
  coreplus.admin:
    description: Full access to CorePlusv2 features
    default: op
  coreplus.user:
    description: Basic access for players
    default: true